<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VideoVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0c;
      --surface: #111116;
      --border: #1e1e28;
      --accent: #e8ff47;
      --accent2: #ff4757;
      --text: #f0f0f5;
      --muted: #5a5a70;
      --card-bg: #13131a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NOISE TEXTURE */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,12,0.85);
      backdrop-filter: blur(16px);
      z-index: 100;
      animation: slideDown 0.6s ease both;
    }

    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* SEARCH */
    .search-wrap {
      position: relative;
    }
    .search-wrap input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      padding: 10px 16px 10px 40px;
      border-radius: 8px;
      width: 240px;
      outline: none;
      transition: border-color 0.2s, width 0.3s;
    }
    .search-wrap input:focus {
      border-color: var(--accent);
      width: 300px;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
    }

    /* BUTTON */
    .btn-add {
      background: var(--accent);
      color: #0a0a0c;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232,255,71,0.25);
    }
    .btn-add:active { transform: translateY(0); }

    /* HERO */
    .hero {
      padding: 64px 48px 32px;
      animation: fadeUp 0.7s 0.1s ease both;
    }
    @keyframes fadeUp {
      from { transform: translateY(24px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    .hero h1 .accent { color: var(--accent); }

    .stats-row {
      display: flex;
      gap: 32px;
      margin-top: 24px;
    }
    .stat {
      display: flex;
      flex-direction: column;
    }
    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 48px;
    }

    /* GRID */
    .grid-section {
      padding: 40px 48px 80px;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* CARD */
    .video-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: cardIn 0.5s ease both;
      position: relative;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.96) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .video-card:hover {
      border-color: rgba(232,255,71,0.3);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #16161f 0%, #1e1e2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 50%, rgba(232,255,71,0.06) 0%, transparent 60%);
    }
    .play-icon {
      width: 44px;
      height: 44px;
      border: 1.5px solid rgba(232,255,71,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(232,255,71,0.6);
      font-size: 16px;
      transition: all 0.2s;
    }
    .video-card:hover .play-icon {
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.1);
    }

    .duration-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(10,10,12,0.8);
      border: 1px solid var(--border);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      padding: 3px 8px;
      border-radius: 4px;
      color: var(--muted);
      font-weight: 500;
    }

    .card-body {
      padding: 16px 20px 14px;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
    }
    .btn-icon {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: all 0.15s;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon.delete:hover { border-color: var(--accent2); color: var(--accent2); }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--muted);
      gap: 12px;
    }
    .empty-state .empty-icon { font-size: 3rem; opacity: 0.3; }
    .empty-state p { font-size: 0.9rem; }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 480px;
      transform: scale(0.95) translateY(16px);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    .btn-close {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .btn-close:hover { border-color: var(--accent2); color: var(--accent2); }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      padding: 12px 14px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group textarea { resize: vertical; min-height: 90px; }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--muted); }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #0a0a0c;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 4px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232,255,71,0.3);
    }
    .btn-submit:disabled { opacity: 0.5; cursor: default; transform: none; }

    /* TOAST */
    .toast-wrap {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      color: var(--text);
      font-size: 0.85rem;
      padding: 12px 18px;
      border-radius: 8px;
      animation: toastIn 0.3s ease both;
      max-width: 280px;
    }
    .toast.error { border-left-color: var(--accent2); }
    @keyframes toastIn {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="logo">Video<span>Vault</span></div>
  <div class="header-actions">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Buscar vídeos..." />
    </div>
    <button class="btn-add" onclick="openModal()">
      <span>+</span> Adicionar Vídeo
    </button>
  </div>
</header>

<section class="hero">
  <h1>Seus<br/><span class="accent">Vídeos.</span></h1>
  <div class="stats-row">
    <div class="stat">
      <span class="stat-num" id="totalCount">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="totalDuration">0m</span>
      <span class="stat-label">Duração</span>
    </div>
  </div>
</section>

<div class="divider"></div>

<section class="grid-section">
  <p class="section-label">Biblioteca</p>
  <div class="video-grid" id="videoGrid">
    <div class="empty-state">
      <div class="empty-icon">▷</div>
      <p>Nenhum vídeo ainda. Adicione o primeiro!</p>
    </div>
  </div>
</section>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Novo Vídeo</span>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Título</label>
      <input type="text" id="fieldTitle" placeholder="Nome do vídeo" />
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <textarea id="fieldDesc" placeholder="Sobre o que é este vídeo?"></textarea>
    </div>
    <div class="form-group">
      <label>Duração (minutos)</label>
      <input type="number" id="fieldDuration" placeholder="ex: 12" min="0" />
    </div>
    <button class="btn-submit" id="submitBtn" onclick="submitForm()">Salvar Vídeo</button>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
  const API = '';
  let editingId = null;
  let allVideos = [];

  // ── FETCH ──────────────────────────────────────────────
  async function loadVideos(search = '') {
    try {
      const res = await fetch(`${API}/videos?search=${encodeURIComponent(search)}`);
      allVideos = await res.json();
      renderGrid(allVideos);
      updateStats(allVideos);
    } catch {
      toast('Erro ao carregar vídeos', true);
    }
  }

  function renderGrid(videos) {
    const grid = document.getElementById('videoGrid');
    if (!videos.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">▷</div><p>Nenhum vídeo encontrado.</p></div>`;
      return;
    }
    grid.innerHTML = videos.map((v, i) => `
      <div class="video-card" style="animation-delay:${i * 0.05}s">
        <div class="card-thumb">
          <div class="play-icon">▶</div>
          ${v.duration ? `<span class="duration-badge">${v.duration}min</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${escHtml(v.title)}</div>
          <div class="card-desc">${escHtml(v.description || 'Sem descrição.')}</div>
        </div>
        <div class="card-footer">
          <button class="btn-icon" onclick="openEdit(${JSON.stringify(v).replace(/"/g,'&quot;')})" title="Editar">✎</button>
          <button class="btn-icon delete" onclick="deleteVideo('${v.id}')" title="Excluir">✕</button>
        </div>
      </div>
    `).join('');
  }

  function updateStats(videos) {
    document.getElementById('totalCount').textContent = videos.length;
    const mins = videos.reduce((s, v) => s + (Number(v.duration) || 0), 0);
    document.getElementById('totalDuration').textContent = mins >= 60
      ? `${Math.floor(mins/60)}h ${mins%60}m`
      : `${mins}m`;
  }

  // ── MODAL ──────────────────────────────────────────────
  function openModal(title = 'Novo Vídeo') {
    editingId = null;
    document.getElementById('fieldTitle').value = '';
    document.getElementById('fieldDesc').value = '';
    document.getElementById('fieldDuration').value = '';
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('submitBtn').textContent = 'Salvar Vídeo';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fieldTitle').focus(), 250);
  }

  function openEdit(video) {
    editingId = video.id;
    document.getElementById('fieldTitle').value = video.title || '';
    document.getElementById('fieldDesc').value = video.description || '';
    document.getElementById('fieldDuration').value = video.duration || '';
    document.getElementById('modalTitle').textContent = 'Editar Vídeo';
    document.getElementById('submitBtn').textContent = 'Atualizar Vídeo';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  // ── SUBMIT ─────────────────────────────────────────────
  async function submitForm() {
    const title = document.getElementById('fieldTitle').value.trim();
    const description = document.getElementById('fieldDesc').value.trim();
    const duration = document.getElementById('fieldDuration').value;

    if (!title) { toast('Título é obrigatório', true); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    const body = { title, description, duration: duration ? Number(duration) : undefined };

    try {
      if (editingId) {
        await fetch(`${API}/videos/${editingId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        toast('Vídeo atualizado!');
      } else {
        await fetch(`${API}/videos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        toast('Vídeo adicionado!');
      }
      closeModal();
      loadVideos(document.getElementById('searchInput').value);
    } catch {
      toast('Erro ao salvar', true);
    } finally {
      btn.disabled = false;
    }
  }

  // ── DELETE ─────────────────────────────────────────────
  async function deleteVideo(id) {
    if (!confirm('Excluir este vídeo?')) return;
    try {
      await fetch(`${API}/videos/${id}`, { method: 'DELETE' });
      toast('Vídeo excluído');
      loadVideos(document.getElementById('searchInput').value);
    } catch {
      toast('Erro ao excluir', true);
    }
  }

  // ── SEARCH ─────────────────────────────────────────────
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadVideos(e.target.value), 300);
  });

  // ── TOAST ──────────────────────────────────────────────
  function toast(msg, error = false) {
    const wrap = document.getElementById('toastWrap');
    const el = document.createElement('div');
    el.className = 'toast' + (error ? ' error' : '');
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  // ── UTILS ──────────────────────────────────────────────
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── INIT ───────────────────────────────────────────────
  loadVideos();
</script>
</body>
</html>
